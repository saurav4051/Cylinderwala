services:
  - type: web
    name: cylinderwala
    runtime: node
    buildCommand: corepack pnpm install --frozen-lockfile
    startCommand: corepack pnpm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_RECOVERY_QUESTION
        sync: false
      - key: ADMIN_RECOVERY_ANSWER
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
